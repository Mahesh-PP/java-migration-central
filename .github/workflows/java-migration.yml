name: Java Migration Workflow

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Target repository URL (e.g., https://github.com/owner/repo)'
        required: true
        type: string
      source_java_version:
        description: 'Source Java version (e.g., 11, 17, 21)'
        required: true
        type: choice
        options:
          - '8'
          - '11'
          - '17'
          - '21'
      target_java_version:
        description: 'Target Java version (e.g., 11, 17, 21)'
        required: true
        type: choice
        options:
          - '11'
          - '17'
          - '21'
      github_token:
        description: 'GitHub Personal Access Token (PAT) - OPTIONAL (for public repos) or REQUIRED (for private repos)'
        required: false
        type: string

jobs:
  migrate-java:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration platform
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure Git credentials
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "mahesh.puthanpurakkal@gmail.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate PAT requirement (optional message)
        run: |
          if [ -z "${{ github.event.inputs.github_token }}" ]; then
            echo "⚠️  No PAT provided - running in TEST mode"
            echo "✅ Migration analysis will run, but PR creation will be skipped"
            echo "🔑 To enable PR creation, provide a GitHub PAT token"
          else
            echo "✅ PAT provided - full workflow will execute"
          fi

      - name: Run Java migration
        env:
          TARGET_REPO_URL: ${{ github.event.inputs.repo_url }}
          SOURCE_JAVA_VERSION: ${{ github.event.inputs.source_java_version }}
          TARGET_JAVA_VERSION: ${{ github.event.inputs.target_java_version }}
          GITHUB_TOKEN: ${{ github.event.inputs.github_token }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "⚠️  No PAT provided - running in PUBLIC REPO mode"
            echo "✅ Will attempt migration on public repositories"
            python3 migration-platform.py migrate \
              --url "$TARGET_REPO_URL" \
              --source "$SOURCE_JAVA_VERSION" \
              --target "$TARGET_JAVA_VERSION" \
              --push \
              --create-pr
          else
            echo "✅ PAT provided - running in AUTHENTICATED mode (for private repos)"
            python3 migration-platform.py migrate \
              --url "$TARGET_REPO_URL" \
              --source "$SOURCE_JAVA_VERSION" \
              --target "$TARGET_JAVA_VERSION" \
              --push \
              --create-pr
          fi

      - name: Extract and Display PR Link
        if: success() && github.event.inputs.github_token != ''
        run: |
          echo "========================================="
          echo "✅ MIGRATION COMPLETED SUCCESSFULLY"
          echo "========================================="
          echo "📦 Target Repository: ${{ github.event.inputs.repo_url }}"
          echo "☕ Source Java Version: ${{ github.event.inputs.source_java_version }}"
          echo "☕ Target Java Version: ${{ github.event.inputs.target_java_version }}"
          echo ""
          echo "🔍 Check the logs above for PR link (search for 'Created PR:')"
          echo "📝 Manual check: https://github.com/spring-projects/spring-petclinic/pulls"
          echo "========================================="

      - name: Upload migration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-report
          path: migration-report/
          retention-days: 30

      - name: Create Pull Request
        if: success() && github.event.inputs.github_token != ''
        env:
          GITHUB_TOKEN: ${{ github.event.inputs.github_token }}
        run: |
          echo "🎉 Migration completed successfully!"
          echo "📝 Check the target repository for the PR: ${{ github.event.inputs.repo_url }}"
