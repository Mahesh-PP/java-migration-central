name: Java Migration Workflow

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Target repository URL (e.g., https://github.com/owner/repo)'
        required: true
        type: string
      source_java_version:
        description: 'Source Java version (e.g., 11, 17, 21)'
        required: true
        type: choice
        options:
          - '8'
          - '11'
          - '17'
          - '21'
      target_java_version:
        description: 'Target Java version (e.g., 11, 17, 21, 25)'
        required: true
        type: choice
        options:
          - '11'
          - '17'
          - '21'
          - '25'
      github_token:
        description: 'GitHub Personal Access Token (PAT) - OPTIONAL (uses workflow token by default)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  migrate-java:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration platform
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure Git credentials
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          
          # Determine which token to use
          if [ -n "${{ github.event.inputs.github_token }}" ]; then
            # Use provided PAT
            echo "Using provided GitHub PAT"
            AUTH_TOKEN="${{ github.event.inputs.github_token }}"
          else
            # Use default workflow token (works for your own repos)
            echo "Using workflow GITHUB_TOKEN (default)"
            AUTH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi
          
          # Export token for git to use
          export GITHUB_TOKEN="${AUTH_TOKEN}"
          echo "GITHUB_TOKEN=${AUTH_TOKEN}" >> $GITHUB_ENV
          
          # Configure git to use the token via environment variable
          git config --global credential.helper 'store --file ~/.git-credentials'
          echo "https://x-access-token:${AUTH_TOKEN}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          
          # Additional: Configure git to use HTTPS with credential helper
          git config --global credential.useHttpPath true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Display authentication mode
        run: |
          if [ -n "${{ github.event.inputs.github_token }}" ]; then
            echo "🔑 Authentication Mode: Custom PAT (for external/private repos)"
            echo "✅ Can push to any repository accessible with the PAT"
          else
            echo "🔑 Authentication Mode: Workflow Token (default)"
            echo "✅ Can push to your own repositories and public repos with write access"
            echo "❌ Cannot push to external repos like spring-projects/spring-petclinic"
            echo ""
            echo "📝 If pushing to an external repo fails, provide a PAT with 'repo' scope"
          fi

      - name: Run Java migration
        env:
          TARGET_REPO_URL: ${{ github.event.inputs.repo_url }}
          SOURCE_JAVA_VERSION: ${{ github.event.inputs.source_java_version }}
          TARGET_JAVA_VERSION: ${{ github.event.inputs.target_java_version }}
        run: |
          python3 migration-platform.py migrate \
            --url "$TARGET_REPO_URL" \
            --source "$SOURCE_JAVA_VERSION" \
            --target "$TARGET_JAVA_VERSION" \
            --push \
            --create-pr

      - name: Display Migration Results
        if: success()
        run: |
          echo "========================================="
          echo "✅ MIGRATION COMPLETED"
          echo "========================================="
          echo "📦 Target Repository: ${{ github.event.inputs.repo_url }}"
          echo "☕ Source Java Version: ${{ github.event.inputs.source_java_version }}"
          echo "☕ Target Java Version: ${{ github.event.inputs.target_java_version }}"
          echo ""
          echo "🔍 Check logs above for PR link (search for 'Created PR:')"
          echo "📝 Or visit: ${{ github.event.inputs.repo_url }}/pulls"
          echo "========================================="

      - name: Upload migration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-report
          path: migration-report/
          retention-days: 30
