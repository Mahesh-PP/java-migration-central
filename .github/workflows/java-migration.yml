name: Java Migration Workflow

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Target repository URL (e.g., https://github.com/owner/repo)'
        required: true
        type: string
      source_java_version:
        description: 'Source Java version (e.g., 11, 17, 21)'
        required: true
        type: choice
        options:
          - '8'
          - '11'
          - '17'
          - '21'
      target_java_version:
        description: 'Target Java version (e.g., 11, 17, 21, 25)'
        required: true
        type: choice
        options:
          - '11'
          - '17'
          - '21'
          - '25'
      github_token:
        description: 'GitHub Personal Access Token (PAT) - OPTIONAL (uses CROSS_REPO_PAT secret by default)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  migrate-java:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration platform
        uses: actions/checkout@v4

      # ── Java is required by Maven/OpenRewrite to run the recipes ──────────
      - name: Set up Java 21 (used by OpenRewrite at runtime)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ubuntu-latest already ships with Maven 3.9.x — no extra setup needed.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure Git credentials
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Prefer an explicit PAT input, fall back to the repository secret
          PAT_TOKEN="${{ github.event.inputs.github_token }}"
          if [ -z "$PAT_TOKEN" ]; then
            PAT_TOKEN="${{ secrets.CROSS_REPO_PAT }}"
          fi

          if [ -z "$PAT_TOKEN" ]; then
            echo "❌ ERROR: No PAT available."
            echo "Either pass github_token as a workflow input, or add CROSS_REPO_PAT as a repository secret."
            exit 1
          fi

          git config --global credential.helper store
          echo "https://x-access-token:${PAT_TOKEN}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials

          echo "GITHUB_TOKEN=${PAT_TOKEN}" >> $GITHUB_ENV
          echo "✅ Git credentials configured"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify toolchain
        run: |
          echo "──────────────────────────────────────"
          java  -version
          mvn   --version
          python3 --version
          git   --version
          echo "──────────────────────────────────────"

      - name: Run Java migration (OpenRewrite + PR)
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        run: |
          python3 migration-platform.py migrate \
            --url "${{ github.event.inputs.repo_url }}" \
            --source "${{ github.event.inputs.source_java_version }}" \
            --target "${{ github.event.inputs.target_java_version }}" \
            --push \
            --create-pr

      - name: Display Migration Results
        if: always()
        run: |
          echo "========================================="
          echo "✅ MIGRATION COMPLETED"
          echo "========================================="
          echo "📦 Target Repository : ${{ github.event.inputs.repo_url }}"
          echo "☕ Java              : ${{ github.event.inputs.source_java_version }} → ${{ github.event.inputs.target_java_version }}"
          echo ""
          echo "🔍 Search the logs above for '🎉 PULL REQUEST CREATED' to get the PR URL."
          echo "📝 Or visit: ${{ github.event.inputs.repo_url }}/pulls"
          echo "========================================="

      - name: Upload migration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-report
          path: .java-migration-central/reports/
          retention-days: 30
